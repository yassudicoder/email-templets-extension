<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Canned Responses</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body class="pop">
  <div class="pophead">Canned Responses</div>
  <p class="pophint">Press <b id="hk">Alt+A</b> in a compose box to insert. Click a template here to copy it.</p>
  <input id="search" class="psearch" placeholder="Search templates…" data-i18n-ph="search_placeholder" autocomplete="off">
  <ul id="list" class="plist"></ul>
  <div class="popfoot">
    <button id="export" class="btn" data-i18n="button_export_backup">Export backup</button>
    <button id="manage" class="btn primary" data-i18n="popup_manage_button">Manage</button>
  </div>
  <div id="status" class="popstatus"></div>

  <script src="../../core/sanitize.js"></script>
  <script src="../../core/model.js"></script>
  <script src="../../core/theme.js"></script>
  <script src="../../core/sync.js"></script>
  <script src="../../core/store.js"></script>
  <script src="../../core/locales.js"></script>
  <script src="../../core/i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
